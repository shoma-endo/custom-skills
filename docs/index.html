<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Assets ダッシュボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<style>
:root {
  --page: #f9f9f7;
  --surface: #fcfcfb;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --hairline: #e1e0d9;
  --ring: rgba(11, 11, 11, 0.10);
  --blue: #1e63b8;
  --blue-tint: rgba(30, 99, 184, 0.09);
  --amber: #8f6200;
  --amber-tint: rgba(143, 98, 0, 0.10);
  --red: #b83232;
  --red-tint: rgba(184, 50, 50, 0.09);
  --bar: #1e63b8;
  --bar-alt: #86b6ef;
  --shadow: rgba(11, 11, 11, 0.18);
  --st-good: #0b7d0b;
  --st-good-tint: rgba(11, 125, 11, 0.10);
  --st-crit: #b83232;
  --st-crit-tint: rgba(184, 50, 50, 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #a8a69f;
    --hairline: #2c2c2a;
    --ring: rgba(255, 255, 255, 0.10);
    --blue: #3987e5;
    --blue-tint: rgba(57, 135, 229, 0.16);
    --amber: #fab219;
    --amber-tint: rgba(250, 178, 25, 0.14);
    --red: #e66767;
    --red-tint: rgba(230, 103, 103, 0.14);
    --bar: #3987e5;
    --bar-alt: #1c5cab;
    --shadow: rgba(0, 0, 0, 0.55);
    --st-good: #2ecc40;
    --st-good-tint: rgba(46, 204, 64, 0.16);
    --st-crit: #d03b3b;
    --st-crit-tint: rgba(230, 103, 103, 0.14);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  background: var(--page);
  color: var(--ink);
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.65;
  min-width: 1480px;
  display: grid;
  grid-template-columns: var(--side-width, 276px) minmax(0, 1fr) var(--detail-width, 340px);
  transition: grid-template-columns 0.16s ease;
}
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
body.side-collapsed { --side-width: 0px; }
body.detail-collapsed { --detail-width: 0px; }
.pane-toggle {
  appearance: none;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--ink-2);
  width: 32px;
  height: 32px;
  border-radius: 5px;
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 1.02rem;
  line-height: 1;
  display: block;
  flex-shrink: 0;
  position: fixed;
  top: 12px;
  z-index: 40;
  box-shadow: 0 2px 10px var(--ring);
}
.pane-toggle:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-tint); }

/* ================= サイドバー ================= */
#side {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1px solid var(--hairline);
  display: flex;
  flex-direction: column;
}
#toggle-side { left: 260px; }
body.side-collapsed #side {
  overflow: visible;
  background: transparent;
  border-right: 0;
}
body.side-collapsed #side { visibility: hidden; }
body.side-collapsed #toggle-side { left: 12px; }
.brand {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 1.32rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 26px 22px 18px;
  border-bottom: 3px solid var(--ink);
  line-height: 1.3;
}
.brand .x { color: var(--blue); }
.brand .sub {
  display: block;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.24em;
  margin-top: 4px;
}
#nav { padding: 14px 0; }
.nav-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  padding: 8px 22px 6px;
}
button.nav-item {
  appearance: none;
  border: none;
  background: none;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 22px;
  cursor: pointer;
  color: var(--ink-2);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.92rem;
  text-align: left;
  border-left: 3px solid transparent;
}
button.nav-item:hover { background: var(--page); color: var(--ink); }
button.nav-item.active {
  background: var(--blue-tint);
  border-left-color: var(--blue);
  color: var(--ink);
  font-weight: 700;
}
.nav-item .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.nav-item .dot { width: 8px; height: 8px; border-radius: 50%; }
.nav-item .dot.amber { background: var(--amber); }
.nav-item .dot.red { background: var(--red); }
.nav-item .nav-cnt { font-size: 0.78rem; color: var(--muted); }
.side-legend {
  border-top: 1px solid var(--hairline);
  padding: 16px 22px;
  font-size: 0.78rem;
  color: var(--ink-2);
}
.side-legend .lg-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  margin-bottom: 8px;
}
.side-legend .key { display: flex; align-items: center; gap: 9px; padding: 3px 0; }
.side-legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--ring); flex-shrink: 0; }
.side-legend .swatch.normal { background: var(--surface); }
.side-legend .swatch.link { background: var(--blue); }
.side-legend .swatch.amber { background: var(--amber); }
.side-legend .swatch.red { background: var(--red); }
.side-meta {
  margin-top: auto;
  border-top: 1px solid var(--hairline);
  padding: 14px 22px 18px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 2;
}
.side-meta code { border: 1px solid var(--hairline); padding: 1px 6px; border-radius: 3px; color: var(--ink-2); }

/* ================= メイン ================= */
#topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--page);
  border-bottom: 1px solid var(--hairline);
  padding: 16px 30px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
#topbar .vt { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
#topbar h2 { font-size: 1.4rem; letter-spacing: 0.02em; white-space: nowrap; }
#topbar .vt .root {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#topbar .tb-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#topbar input.search {
  width: 340px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  color: var(--ink);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.92rem;
  padding: 9px 14px;
}
#topbar input.search:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
#topbar select.sortsel {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  color: var(--ink);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  padding: 9px 10px;
  cursor: pointer;
}
#topbar select.sortsel:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
main { padding: 22px 30px 90px; max-width: 1720px; }

/* ---- KPIタイル ---- */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.tile {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 16px 20px 14px;
}
.tile .value { font-size: 2.5rem; font-weight: 700; line-height: 1.15; }
.tile .value.zero { color: var(--muted); font-weight: 400; }
.tile .label { font-size: 0.84rem; color: var(--ink-2); letter-spacing: 0.04em; margin-top: 2px; }
.tile.accent-blue { border-top: 4px solid var(--blue); }
.tile.accent-amber { border-top: 4px solid var(--amber); }
.tile.accent-red { border-top: 4px solid var(--red); }
.tile[data-jump] { cursor: pointer; transition: box-shadow 0.12s ease, border-color 0.12s ease; }
.tile[data-jump]:hover { border-color: var(--blue); box-shadow: 0 4px 16px var(--ring); }
.tile[data-jump] .label::after { content: " ↓"; color: var(--muted); }
.panel, .tree-sec { scroll-margin-top: 76px; }

/* ---- 前回比diffストリップ ---- */
.diff-strip {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 11px 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 7px;
  font-size: 0.84rem;
}
.diff-strip.none { color: var(--muted); }
.diff-strip .dhead {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  color: var(--ink-2);
  margin-right: 4px;
  white-space: nowrap;
}
.dchip {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  padding: 2px 9px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
}
.dchip.add { color: var(--st-good); border-color: var(--st-good); background: var(--st-good-tint); }
.dchip.del { color: var(--st-crit); border-color: var(--st-crit); background: var(--st-crit-tint); }

/* ---- パネル ---- */
.panel {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}
.panel-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 20px;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  user-select: none;
  list-style: none;
}
.panel-head::-webkit-details-marker { display: none; }
.panel-head::marker { content: ''; }
.panel-head:hover { background: var(--page); }
.panel-head .ph-title-wrap { display: flex; align-items: baseline; gap: 9px; min-width: 0; }
.panel-head .ph-chevron {
  display: inline-block;
  font-size: 0.72rem;
  color: var(--muted);
  transform: rotate(90deg);
  transition: transform 0.15s ease;
  flex: none;
}
.panel-head .ph-chevron::before { content: '▸'; }
details.panel:not([open]) > .panel-head .ph-chevron { transform: rotate(0deg); }
details.panel:not([open]) > .panel-head { border-bottom: none; }
.panel-head .ph-title {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.panel-head .ph-sub { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--muted); }
.panel-body { padding: 18px 20px; }
.panel-row { display: grid; grid-template-columns: 2fr 3fr; gap: 20px; align-items: start; }
.panel-row .panel { margin-bottom: 0; }
.panel-row { margin-bottom: 20px; }

/* ---- 分布バー（積み上げ / 実体＋リンク） ---- */
.dist .lg { display: flex; gap: 18px; justify-content: flex-end; font-size: 0.78rem; color: var(--ink-2); margin-bottom: 10px; }
.dist .lg .key { display: flex; align-items: center; gap: 6px; }
.dist .lg .sw { width: 12px; height: 12px; border-radius: 3px; }
.dist .lg .sw.real { background: var(--bar); }
.dist .lg .sw.alt { background: var(--bar-alt); }
.dist .row { display: grid; grid-template-columns: 200px 1fr 96px; align-items: center; gap: 14px; margin: 9px 0; }
.dist .name {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  color: var(--ink-2);
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dist .track { height: 18px; display: flex; }
.dist .seg { height: 100%; min-width: 2px; }
.dist .seg.real { background: var(--bar); border-radius: 3px 0 0 3px; }
.dist .seg.alt { background: var(--bar-alt); border-radius: 0 4px 4px 0; margin-left: 2px; }
.dist .seg.alt:first-child { border-radius: 4px; margin-left: 0; }
.dist .count { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.84rem; color: var(--ink); white-space: nowrap; }
.dist .count .lnk { color: var(--muted); }

/* ---- スキルカード ---- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
.card {
  background: var(--page);
  border: 1px solid var(--hairline);
  border-left: 4px solid var(--hairline);
  border-radius: 5px;
  padding: 13px 15px 11px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: box-shadow 0.12s ease, transform 0.12s ease;
  cursor: default;
}
.card:hover { box-shadow: 0 4px 16px var(--ring); transform: translateY(-1px); }
.card.sel { box-shadow: 0 0 0 2px var(--blue); }
table.jobs tr.sel td { background: var(--blue-tint); }
.card.role-link { border-left-color: var(--blue); }
.card.role-amber { border-left-color: var(--amber); background: linear-gradient(var(--amber-tint), var(--amber-tint)) var(--page); }
.card.role-red { border-left-color: var(--red); background: linear-gradient(var(--red-tint), var(--red-tint)) var(--page); }
.card .name { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 1.02rem; font-weight: 700; word-break: break-all; }
.card .fm { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--muted); }
.card .badges { display: flex; flex-wrap: wrap; gap: 5px; }
.badge {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.badge.b-link { color: var(--blue); border-color: var(--blue); background: var(--blue-tint); }
.badge.b-amber { color: var(--amber); border-color: var(--amber); background: var(--amber-tint); }
.badge.b-red { color: var(--red); border-color: var(--red); background: var(--red-tint); }
.badge.b-mute { color: var(--muted); border-color: var(--hairline); }
.card .desc {
  font-size: 0.84rem;
  color: var(--ink-2);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .desc:empty { display: none; }
.card .path { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.72rem; color: var(--muted); margin-top: auto; word-break: break-all; }
.card .meta-row { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }

/* ---- ツリーセクション ---- */
.tree-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--ink);
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tree-sec:first-child .tree-head { margin-top: 0; }
.tree-head .cnt { color: var(--muted); font-weight: 400; font-size: 0.78rem; }
.notice {
  background: var(--blue-tint);
  border: 1px solid var(--blue);
  border-radius: 5px;
  padding: 10px 15px;
  font-size: 0.84rem;
  color: var(--ink-2);
  margin: 0 0 14px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.empty-note { color: var(--muted); font-size: 0.84rem; padding: 14px; background: var(--page); border: 1px dashed var(--hairline); border-radius: 5px; }

/* ---- 重複マトリクス ---- */
table.matrix { border-collapse: collapse; width: 100%; }
table.matrix th, table.matrix td {
  border: 1px solid var(--hairline);
  padding: 8px 12px;
  font-size: 0.84rem;
  text-align: center;
  white-space: nowrap;
}
table.matrix th {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  color: var(--ink-2);
  background: var(--page);
  font-weight: 700;
}
table.matrix td.name { text-align: left; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; font-size: 0.92rem; }
table.matrix .mark { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; padding: 2px 7px; border-radius: 3px; display: inline-block; margin: 1px; }
table.matrix .mark.real-amber { background: var(--amber-tint); color: var(--amber); border: 1px solid var(--amber); }
table.matrix .mark.real-red { background: var(--red-tint); color: var(--red); border: 1px solid var(--red); }
table.matrix .mark.alias { background: var(--blue-tint); color: var(--blue); border: 1px solid var(--blue); }

/* ---- リンク一覧 ---- */
details.links summary {
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  color: var(--ink-2);
}
details.links ul { list-style: none; padding: 12px 0 0; columns: 2; }
details.links li { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--muted); padding: 2px 0; }
details.links li .from { color: var(--ink-2); }
details.links li .arrow { color: var(--blue); }

/* ---- takt ---- */
.takt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }
.chip {
  display: inline-block;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  padding: 2px 10px;
  border-radius: 11px;
  border: 1px solid var(--ink-2);
  color: var(--ink-2);
  margin: 3px 3px 0 0;
}
.chip.missing { border-style: dashed; color: var(--muted); border-color: var(--muted); }
.chip.wf { border-color: var(--blue); color: var(--blue); border-radius: 3px; }

/* ---- launchd ジョブ表 ---- */
table.jobs { border-collapse: collapse; width: 100%; }
table.jobs th, table.jobs td {
  border-bottom: 1px solid var(--hairline);
  padding: 10px 14px;
  font-size: 0.92rem;
  text-align: left;
  vertical-align: top;
}
table.jobs th {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}
table.jobs tr[data-pop] { cursor: default; }
table.jobs tr[data-pop]:hover td { background: var(--blue-tint); }
table.jobs td.job-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; font-size: 0.92rem; white-space: nowrap; }
table.jobs td.job-desc { max-width: 480px; }
table.jobs td.job-desc .cmd { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--muted); }
table.jobs td.mono-cell { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.78rem; color: var(--ink-2); white-space: nowrap; }
table.jobs td.mono-cell .ago { color: var(--muted); }
.stbadge {
  display: inline-block;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid;
  white-space: nowrap;
}
.stbadge.st-run { color: var(--blue); border-color: var(--blue); background: var(--blue-tint); }
.stbadge.st-ok { color: var(--st-good); border-color: var(--st-good); background: var(--st-good-tint); }
.stbadge.st-err { color: var(--st-crit); border-color: var(--st-crit); background: var(--st-crit-tint); }
.stbadge.st-off { color: var(--muted); border-color: var(--hairline); background: var(--page); }
button.runbtn {
  appearance: none;
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--blue);
  color: var(--blue);
  background: var(--blue-tint);
  white-space: nowrap;
}
button.runbtn:hover { background: var(--blue); color: var(--surface); }
button.runbtn.confirm { border-color: var(--amber); color: var(--amber); background: var(--amber-tint); }
button.runbtn.confirm:hover { background: var(--amber); color: var(--surface); }
button.runbtn:disabled { border-color: var(--hairline); color: var(--muted); background: var(--page); cursor: not-allowed; }
#detail pre.pop-err {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  color: var(--st-crit);
  background: var(--st-crit-tint);

function isStale(e) { return !e.broken && e.mtimeMs != null && daysSince(e.mtimeMs) >= DATA.staleDays; }
function fmtDate(ms) {
  const d = new Date(ms);
  const pad2 = function (n) { return n < 10 ? '0' + n : String(n); };
  const days = daysSince(ms);
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) +
    '（' + (days <= 0 ? '今日' : days + '日前') + '）';
}
function skillBadges(e) {
  var b = '';
  if (e.link) b += '<span class="badge b-link">↪ リンク → ' + esc(e.link) + '</span>';
  if (e.dupSame) b += '<span class="badge b-amber">⚠ スコープ内重複（.claude＋.agents）</span>';
  e.dupCross.forEach(function (l) { b += '<span class="badge b-red">✖ 重複 → ' + esc(l) + '</span>'; });
  if (e.broken) b += '<span class="badge b-mute">リンク切れ</span>';
  if (!e.desc && !e.broken) b += '<span class="badge b-mute">SKILL.md メタ情報なし</span>';
  if (isStale(e)) b += '<span class="badge b-mute">⏳ ' + daysSince(e.mtimeMs) + '日未更新</span>';
  if (e.tools !== null) b += '<span class="badge b-mute">tools: ' + e.tools + '</span>';
  return b;
}

// ---- 統計 ----
function computeStats(scopes) {
  const skills = allSkills(scopes);
  const dupSameNames = new Set();
  const dupCrossNames = new Set();
  skills.forEach(function (e) {
    if (e.dupSame) dupSameNames.add(e.dir);
    if (e.dupCross.length > 0) dupCrossNames.add(e.dir);
  });
  let wf = 0, ps = 0;
  scopes.forEach(function (s) {
    if (s.takt) { wf += s.takt.workflows.length; ps += s.takt.personas.length; }
  });
  const staleReals = new Set();
  skills.forEach(function (e) { if (isStale(e)) staleReals.add(e.real); });
  return {
    real: uniqueReals(skills),
    links: skills.filter(function (e) { return e.link !== null; }).length,
    dupSame: dupSameNames.size,
    dupCross: dupCrossNames.size,
    stale: staleReals.size,
    workflows: wf,
    personas: ps,
  };
}

      (jump ? ' data-jump="' + jump + '"' + (sort ? ' data-sort="' + sort + '"' : '') + ' title="クリックで一覧へ"' : '') + '>' +
      '<div class="value' + (zero ? ' zero' : '') + '">' + value + '</div>' +
      '<div class="label">' + esc(label) + '</div></div>';

  let html = '<div class="tiles">' +
    tile(stats.real, 'スキル実体（重複除外）', '', true, '.scope-panel') +
    tile(stats.links, 'リンク（エイリアス）', 'accent-blue', true, '#sec-links') +
    tile(stats.dupSame, 'スコープ内重複', stats.dupSame > 0 ? 'accent-amber' : '', false, '#sec-matrix') +
    tile(stats.dupCross, 'スコープ間重複', stats.dupCross > 0 ? 'accent-red' : '', false, '#sec-matrix') +
    tile(stats.stale, DATA.staleDays + '日以上未更新', stats.stale > 0 ? 'accent-amber' : '', false, '.scope-panel', 'oldest') +
    tile(stats.workflows, 'takt ワークフロー', '', true, '.sec-takt-wf') +
    tile(stats.personas, 'takt ペルソナ', '', true, '.sec-takt-ps');
  if (withLaunchd && DATA.launchd && DATA.launchd.length > 0) {

// ---- 分布パネル（積み上げ: 実体エントリ＋リンク） ----
function renderDistPanel(scopes) {
  const rows = scopes.map(function (s) {
    const real = s.skills.filter(function (e) { return !e.link; }).length;
    const links = s.skills.filter(function (e) { return e.link; }).length;
    return { label: s.label, real: real, links: links };
  });
  const max = Math.max.apply(null, rows.map(function (r) { return r.real + r.links; }).concat([1]));
  let html = '<div class="dist">' +
    '<div class="lg"><span class="key"><span class="sw real"></span>実体エントリ</span>' +
    '<span class="key"><span class="sw alt"></span>リンク</span></div>';
  rows.forEach(function (r) {
    const wr = Math.round((r.real / max) * 100);
    const wl = Math.round((r.links / max) * 100);
    html += '<div class="row"><div class="name">' + esc(r.label) + '</div><div class="track">' +
      (r.real > 0 ? '<div class="seg real" style="width:' + wr + '%"></div>' : '') +
      (r.links > 0 ? '<div class="seg alt" style="width:' + wl + '%"></div>' : '') +
      '</div><div class="count">' + r.real + (r.links > 0 ? ' <span class="lnk">+ ' + r.links + '</span>' : '') + '</div></div>';
  });
  return panel('スコープ別エントリ構成', '実体 + リンク', html + '</div>');
}

function renderMatrixPanel(scopes) {

  names.forEach(function (name) {

// ---- launchd ジョブパネル ----
function fmtWhen(ms) {
  if (ms == null) return '—';
  const d = new Date(ms);
  const pad2 = function (n) { return n < 10 ? '0' + n : String(n); };
  const abs = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  const diff = Date.now() - ms;
  let ago;
  if (diff < 60000) ago = 'たった今';
  else if (diff < 3600000) ago = Math.floor(diff / 60000) + '分前';
  else if (diff < 86400000) ago = Math.floor(diff / 3600000) + '時間前';
  else ago = Math.floor(diff / 86400000) + '日前';
  return abs + '<span class="ago">（' + ago + '）</span>';
}
function jobBadge(j) {
  if (j.status === 'running') return '<span class="stbadge st-run">● 実行中 (PID ' + j.pid + ')</span>';
  if (j.status === 'error') return '<span class="stbadge st-err">✖ エラー (exit ' + j.lastExit + ')</span>';
  if (j.status === 'unloaded') return '<span class="stbadge st-off">⏸ 未ロード</span>';
  return '<span class="stbadge st-ok">✓ 正常待機</span>';
}
function runBtn(j) {
  if (serverMode) {
    if (!j.loaded) return '<button class="runbtn" disabled title="未ロードのジョブは実行できません">▶ 実行</button>';
    const restart = j.status === 'running';
    return '<button class="runbtn" data-label="' + esc(j.label) + '" data-restart="' + (restart ? '1' : '0') + '">' +
      (restart ? '↻ 再起動' : '▶ 実行') + '</button>';
  }
  const cmd = 'launchctl kickstart ' + (j.status === 'running' ? '-k ' : '') + 'gui/' + DATA.uid + '/' + j.label;
  return '<button class="runbtn" data-cmd="' + esc(cmd) + '" title="静的モード: クリックで実行コマンドをコピー（ライブ実行は npm run agent-assets:serve）">⧉ コピー</button>';
}
function renderLaunchdPanel() {
  const jobs = DATA.launchd || [];
  if (jobs.length === 0) return '';
  const cnt = { running: 0, ok: 0, error: 0, unloaded: 0 };
  jobs.forEach(function (j) { cnt[j.status]++; });
  const sub = '実行中 ' + cnt.running + '　正常 ' + cnt.ok + '　エラー ' + cnt.error + '　未ロード ' + cnt.unloaded +
    (serverMode ? '　（ライブ）' : '　（生成時点のスナップショット）');

  let html = '<div style="overflow-x:auto"><table class="jobs"><thead><tr>' +
    '<th>状態</th><th>操作</th><th>ジョブ</th><th>処理内容</th><th>スケジュール</th><th>最終実行</th><th>前回結果</th>' +
    '</tr></thead><tbody>';
  jobs.forEach(function (j) {
    let popHtml = '<div class="pop-title">' + esc(j.label) + '</div>' +
      (j.desc ? '<div class="pop-desc">' + esc(j.desc) + '</div>' : '') +
      (j.errTail ? '<div class="pop-sec">stderr 末尾</div><pre class="pop-err">' + esc(j.errTail) + '</pre>' : '') +
      '<div class="pop-meta">plist: <b>' + esc(j.plist) + '</b><br>' +
      'コマンド: <b>' + esc(j.command) + '</b>' +
      (j.logOut ? '<br>stdout: <b>' + esc(j.logOut) + '</b>' : '') +
      (j.logErr ? '<br>stderr: <b>' + esc(j.logErr) + '</b>' : '') +
      '</div>';
    const popId = reg(j.status === 'error' ? 'red' : 'mute', popHtml);
    const searchText = (j.label + ' ' + (j.desc || '') + ' ' + j.command).toLowerCase();

    html += '<tr data-pop="' + popId + '" data-search="' + esc(searchText) + '"' + openAttr(j.plist) + '>' +
      '<td>' + jobBadge(j) + '</td>' +
      '<td>' + runBtn(j) + '</td>' +
      '<td class="job-label">' + esc(j.label) + '</td>' +
      '<td class="job-desc">' + (j.desc ? esc(j.desc) : '<span class="cmd">' + esc(j.command) + '</span>') + '</td>' +
      '<td class="mono-cell">' + esc(j.schedule) + '</td>' +

      '<td class="mono-cell">' + (j.lastExit === null ? '—' : 'exit ' + j.lastExit) + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  return panel('launchd ジョブ', sub, html, '', 'sec-launchd');
}

function hzPairBars(now, prev) {

/* 日別 run 数の積み上げ棒（緑=completed / 赤=failed・aborted / 琥珀=その他） */
function hzDayChart(runs, days) {
  var today = new Date(); today.setHours(0, 0, 0, 0);
  var buckets = [];
  for (var i = days - 1; i >= 0; i--) buckets.push({ t: today.getTime() - i * 86400000, ok: 0, ng: 0, oth: 0 });
  runs.forEach(function (r) {
    buckets.forEach(function (b) {
      if (r.startMs >= b.t && r.startMs < b.t + 86400000) {
        if (r.status === 'completed') b.ok++;
        else if (r.status === 'failed' || r.status === 'aborted') b.ng++;
        else b.oth++;
      }
    });
  });
  var max = 1;
  buckets.forEach(function (b) { max = Math.max(max, b.ok + b.ng + b.oth); });
  function seg(n, cls) {
    return n > 0 ? '<div class="seg ' + cls + '" style="height:' + Math.max(4, Math.round(n / max * 56)) + 'px"></div>' : '';
  }
  return '<div class="hz-days">' + buckets.map(function (b) {
    var d = new Date(b.t);
    var total = b.ok + b.ng + b.oth;
    return '<div class="day"><div class="col">' + seg(b.oth, 'oth') + seg(b.ng, 'ng') + seg(b.ok, 'ok') + '</div>' +
      '<div class="lbl">' + (d.getMonth() + 1) + '/' + d.getDate() + '</div>' +
      '<div class="cnt">' + (total || '&nbsp;') + '</div></div>';
  }).join('') + '</div>';
}
/* workflow 別の成否積み上げ横棒 */
function hzWorkflowBars(runs) {
  var agg = {};
  runs.forEach(function (r) {
    var a = agg[r.workflow] || (agg[r.workflow] = { ok: 0, ng: 0, oth: 0 });
    if (r.status === 'completed') a.ok++;
    else if (r.status === 'failed' || r.status === 'aborted') a.ng++;
    else a.oth++;
  });
  var names = Object.keys(agg).sort(function (x, y) {
    var ax = agg[x], ay = agg[y];
    return (ay.ok + ay.ng + ay.oth) - (ax.ok + ax.ng + ax.oth);
  });
  var max = 1;
  names.forEach(function (n) { var a = agg[n]; max = Math.max(max, a.ok + a.ng + a.oth); });
  return names.map(function (n) {
    var a = agg[n];
    var total = a.ok + a.ng + a.oth;
    function span(v, cls) { return v > 0 ? '<span class="' + cls + '" style="width:' + (v / max * 100) + '%"></span>' : ''; }
    return '<div class="hz-wfbar" data-search="' + esc(n.toLowerCase()) + '">' +
      '<span class="wf-name">' + esc(n) + '</span>' +
      '<div class="track">' + span(a.ok, 'ok') + span(a.ng, 'ng') + span(a.oth, 'oth') + '</div>' +
      '<span class="wf-cnt">' + total + '本' + (a.ng ? '・失敗' + a.ng : '') + '</span></div>';
  }).join('');
}

function renderView(keepScroll) {
  const y = window.scrollY;
  const app = document.getElementById('app');
  POP = [];
  curPop = -1;
  selEl = null;
  let html = '';

  if (activeView === 'harness' && DATA.harness) {
    document.getElementById('view-title').textContent = 'ハーネス構造';
    document.getElementById('view-root').textContent = 'マクロ/ミクロハーネス v2 ・ 再生成で自動反映';
    html = renderHarnessView();
    app.innerHTML = html;
    applySearch();
    window.scrollTo(0, keepScroll ? y : 0);
    return;
  }

  if (activeView === 'ops' && DATA.ops) {
    document.getElementById('view-title').textContent = '運用ヘルス';
    document.getElementById('view-root').textContent = '鮮度・コスト・棚卸し ・ 再生成で更新';
    html = renderOpsView();
    app.innerHTML = html;
    applySearch();
    window.scrollTo(0, keepScroll ? y : 0);
    return;
  }

  if (activeView === 'launchd') {
    document.getElementById('view-title').textContent = 'launchd ジョブ';
    document.getElementById('view-root').textContent = '~/Library/LaunchAgents';
    html = renderLaunchdPanel() || '<div class="empty-note">launchd ジョブなし</div>';
  } else if (activeView === 'plugins') {
    document.getElementById('view-title').textContent = 'プラグイン';
    document.getElementById('view-root').textContent = '~/.claude/plugins ・ ~/.codex/config.toml';
    html = renderPluginsPanel() || '<div class="empty-note">プラグインなし</div>';
  } else {
    const scopes = activeView === 'all'
      ? DATA.scopes
      : DATA.scopes.filter(function (s) { return s.id === activeView; });

    document.getElementById('view-title').textContent =
      activeView === 'all' ? '全体サマリー' : scopes[0].label;
    document.getElementById('view-root').textContent =
      activeView === 'all' ? DATA.scopes.length + ' スコープ' : scopes[0].root;

    html = renderTiles(computeStats(scopes), activeView === 'all');
    if (activeView === 'all') {
      html += renderDiffStrip();
      html += '<div class="panel-row">' + renderDistPanel(DATA.scopes) + renderMatrixPanel(scopes) + '</div>';
      html += renderLaunchdPanel();
      html += renderPluginsPanel();
    } else {
      html += renderMatrixPanel(scopes);
    }
    html += renderLinksPanel(scopes);
    scopes.forEach(function (s) { html += renderScopePanel(s); });
  }

  app.innerHTML = html;
  applySearch();
  window.scrollTo(0, keepScroll ? y : 0);
}

// ---- サイドバーナビ ----
function renderNav() {
  const nav = document.getElementById('nav');
  function dots(s) {
    let d = '';
    if (s.skills.some(function (e) { return e.dupSame; })) d += '<span class="dot amber" title="スコープ内重複あり"></span>';
    if (s.skills.some(function (e) { return e.dupCross.length > 0; })) d += '<span class="dot red" title="スコープ間重複あり"></span>';
    return d;
  }
  let html = '<div class="nav-head">スコープ</div>' +
    '<button class="nav-item active" data-view="all"><span>全体</span>' +
    '<span class="nav-right"><span class="nav-cnt">' + uniqueReals(allSkills(DATA.scopes)) + '</span></span></button>';
  DATA.scopes.forEach(function (s) {
    html += '<button class="nav-item" data-view="' + esc(s.id) + '"><span>' + esc(s.label) + '</span>' +
      '<span class="nav-right">' + dots(s) + '<span class="nav-cnt">' + uniqueReals(s.skills) + '</span></span></button>';
  });
  const hasLaunchd = DATA.launchd && DATA.launchd.length > 0;
  const hasPlugins = DATA.plugins && DATA.plugins.length > 0;
  if (hasLaunchd || hasPlugins) html += '<div class="nav-head">システム</div>';
  if (hasLaunchd) {
    let jdots = '';
    if (DATA.launchd.some(function (j) { return j.status === 'error'; })) jdots += '<span class="dot red" title="エラーあり"></span>';
    if (DATA.launchd.some(function (j) { return j.status === 'unloaded'; })) jdots += '<span class="dot amber" title="未ロードあり"></span>';
    html += '<button class="nav-item" data-view="launchd"><span>launchd</span>' +
      '<span class="nav-right">' + jdots + '<span class="nav-cnt">' + DATA.launchd.length + '</span></span></button>';
  }
  if (hasPlugins) {
    let pdots = '';
    if (DATA.plugins.some(function (p) { return (p.inClaude && !p.claudeEnabled) || (p.inCodex && !p.codexEnabled); })) {
      pdots += '<span class="dot amber" title="無効化されたプラグインあり"></span>';
    }
    html += '<button class="nav-item" data-view="plugins"><span>plugins</span>' +
      '<span class="nav-right">' + pdots + '<span class="nav-cnt">' + DATA.plugins.length + '</span></span></button>';
  }
  if (DATA.harness) {
    let hdots = '';
    if (DATA.harness.runs.some(function (r) { return r.status === 'failed' || r.status === 'aborted' || r.stuck; })) {
      hdots += '<span class="dot red" title="失敗・中断・滞留 run あり"></span>';
    }
    if (DATA.harness.runs.some(function (r) { return r.zombie; })) {
      hdots += '<span class="dot amber" title="放置（ゾンビ疑い）run あり"></span>';
    }
    const hwip = DATA.harness.runs.filter(function (r) { return !HZ_TERMINAL[r.status] && !r.zombie; }).length;
    if (hwip > 3) hdots += '<span class="dot amber" title="WIP が 3 本超"></span>';
    html += '<div class="nav-head">ハーネス</div>' +
      '<button class="nav-item" data-view="harness"><span>ハーネス構造</span>' +
      '<span class="nav-right">' + hdots + '<span class="nav-cnt">' + DATA.harness.runs.length + '</span></span></button>';
  }
  if (DATA.ops) {
    var odots = '';
    var opsStale = DATA.ops.pipelines.filter(function (p) { return p.stale; }).length;
    var opsCleanup = DATA.ops.cleanup.staleSkills.length + DATA.ops.cleanup.unusedPersonas.length + DATA.ops.cleanup.idleWorkflows.length;
    if (DATA.ops.pipelines.some(function (p) { return p.lastMs == null; })) odots += '<span class="dot red" title="成果物が見つからないパイプラインあり"></span>';
    else if (opsStale > 0) odots += '<span class="dot red" title="鮮度遅延のパイプラインあり"></span>';
    if (opsCleanup > 0) odots += '<span class="dot amber" title="棚卸し候補あり"></span>';
    if (!DATA.harness) html += '<div class="nav-head">ハーネス</div>';
    html += '<button class="nav-item" data-view="ops"><span>運用ヘルス</span>' +
      '<span class="nav-right">' + odots + '<span class="nav-cnt">' + DATA.ops.pipelines.length + '</span></span></button>';
  }
  nav.innerHTML = html;
  nav.querySelectorAll('.nav-item').forEach(function (b) {
    b.addEventListener('click', function () {
      activeView = b.getAttribute('data-view');
      nav.querySelectorAll('.nav-item').forEach(function (x) { x.classList.toggle('active', x === b); });
      renderView();
    });
  });
}

function applySearch() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('[data-search]').forEach(function (el) {
    el.classList.toggle('hidden', q !== '' && el.getAttribute('data-search').indexOf(q) === -1);
  });
  // 検索中はヒットゼロのセクション・スコープ/プラグインパネルを見出しごと隠す
  document.querySelectorAll('.tree-sec, .scope-panel, .plugins-panel').forEach(function (sec) {
    const hasVisible = Array.prototype.some.call(
      sec.querySelectorAll('[data-search]'),
      function (el) { return !el.classList.contains('hidden'); }
    );
    sec.classList.toggle('hidden', q !== '' && !hasVisible);
  });
}

// ---- クリックでファイル中身をブラウザ内表示（フォルダは従来どおり Finder / 一覧を開く） ----
function openInlineViewer(p, text) {
  const escHtml = text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const name = p.split('/').pop() || p;
  const html = '<!DOCTYPE html><meta charset="utf-8"><title>' + name.replace(/</g, '&lt;') + '</title>' +
    '<body style="margin:0;background:#1a1a19;color:#e8e7e2">' +
    '<div style="position:sticky;top:0;padding:8px 16px;font:12px/1.5 ui-monospace,'SF Mono',Menlo,monospace;color:#a8a69f;background:#1a1a19;border-bottom:1px solid #2c2c2a;word-break:break-all">' + p.replace(/</g, '&lt;') + '</div>' +
    '<pre style="margin:0;padding:16px;white-space:pre-wrap;word-break:break-word;font:13px/1.6 ui-monospace,'SF Mono',Menlo,monospace">' + escHtml + '</pre></body>';
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  window.open(URL.createObjectURL(blob), '_blank');
}
document.addEventListener('click', function (ev) {
  const t = ev.target;
  if (!t || !t.closest) return;
  // ボタン・タイル・折りたたみ見出しのクリックは既存動作を優先
  if (t.closest('button') || t.closest('a') || t.closest('summary') || t.closest('.tile')) return;
  const el = t.closest('[data-open]');
  if (!el) return;
  const p = el.getAttribute('data-open');
  if (!p) return;
  // ファイル実体があれば外部アプリ起動やダウンロードに頼らずブラウザ内にそのまま表示する
  if (DATA.fileContents && Object.prototype.hasOwnProperty.call(DATA.fileContents, p)) {
    openInlineViewer(p, DATA.fileContents[p]);
    return;
  }
  // フォールバック（フォルダ等、中身を埋め込めない対象のみ）
  if (serverMode) {
    // ライブモード: サーバ経由で Finder / 既定アプリで開く
    fetch('/api/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: p }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) { if (!res.ok && res.error) console.error('open error:', res.error); })
      .catch(function (e) { console.error('open error:', e); });
  } else {
    // 静的モード（file:// で閲覧中）: フォルダはブラウザのディレクトリ一覧を開く
    window.open('file://' + p.split('/').map(encodeURIComponent).join('/'), '_blank');
  }
});

// ---- launchd 手動実行 ----
var pollTimer = null;
function pollStatus(remain) {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(function () {
    fetch('/api/launchd/status', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (jobs) {
        DATA.launchd = jobs;
        if (activeView === 'launchd' || activeView === 'all') renderView(true);
        if (remain > 1) pollStatus(remain - 1);
      })
      .catch(function () {});
  }, 2500);
}
document.addEventListener('click', function (ev) {
  const btn = ev.target && ev.target.closest ? ev.target.closest('.runbtn') : null;
  if (!btn || btn.disabled) return;

  // 静的モード: kickstart コマンドをクリップボードへ
  const cmd = btn.getAttribute('data-cmd');
  if (cmd) {
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) { /* noop */ }
    document.body.removeChild(ta);
    btn.textContent = '✓ コピー済み';
    setTimeout(function () { btn.textContent = '⧉ コピー'; }, 2000);
    return;
  }

  // ライブモード: 2段階確認 → POST /api/launchd/run
  const label = btn.getAttribute('data-label');
  if (!label) return;
  const restart = btn.getAttribute('data-restart') === '1';
  if (btn.getAttribute('data-confirm') !== '1') {
    btn.setAttribute('data-confirm', '1');
    btn.classList.add('confirm');
    btn.textContent = restart ? '再起動する？' : '実行する？';
    setTimeout(function () {
      btn.removeAttribute('data-confirm');
      btn.classList.remove('confirm');
      btn.textContent = restart ? '↻ 再起動' : '▶ 実行';
    }, 3000);
    return;
  }
  btn.disabled = true;
  btn.classList.remove('confirm');
  btn.textContent = '… 起動中';
  fetch('/api/launchd/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label: label, restart: restart }),
  })
    .then(function (r) { return r.json(); })
    .then(function (res) {
      btn.textContent = res.ok ? '✓ 起動指示済み' : '✖ 失敗';
      if (!res.ok && res.error) console.error('launchd run error:', res.error);
      pollStatus(4);
    })
    .catch(function () { btn.textContent = '✖ 失敗'; });
});

// ---- 初期化 ----
document.getElementById('meta-generated').textContent = '生成: ' + DATA.generatedAt;
document.getElementById('meta-command').textContent = DATA.command;
if (DATA.redacted) document.getElementById('meta-mode').textContent = 'モード: 共有用（launchd・プラグイン・実パス除外）';
document.getElementById('search').addEventListener('input', applySearch);
document.getElementById('sort').addEventListener('change', function () {
  sortMode = this.value;
  renderView(true);
});
renderNav();
renderView();
// ライブモード検出（--serve で配信されている場合のみ API が生えている）
fetch('/api/launchd/status', { cache: 'no-store' })
  .then(function (r) { return r.ok ? r.json() : null; })
  .then(function (jobs) {
    if (!jobs) return;
    serverMode = true;
    DATA.launchd = jobs;
    document.getElementById('meta-mode').textContent = 'モード: ライブ（手動実行可）';
    renderView(true);
  })
  .catch(function () { /* file:// や静的配信では静的モードのまま */ });
</script>
</body>
</html>
