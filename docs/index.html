<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Assets ダッシュボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
<style>
:root {
  --page: #f9f9f7;
  --surface: #fcfcfb;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --hairline: #e1e0d9;
  --ring: rgba(11, 11, 11, 0.10);
  --blue: #2a78d6;
  --blue-tint: rgba(42, 120, 214, 0.09);
  --amber: #c98500;
  --amber-tint: rgba(201, 133, 0, 0.10);
  --red: #d03b3b;
  --red-tint: rgba(208, 59, 59, 0.09);
  --bar: #2a78d6;
  --bar-alt: #86b6ef;
  --shadow: rgba(11, 11, 11, 0.18);
  --st-good: #0ca30c;
  --st-good-tint: rgba(12, 163, 12, 0.10);
  --st-crit: #d03b3b;
  --st-crit-tint: rgba(208, 59, 59, 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hairline: #2c2c2a;
    --ring: rgba(255, 255, 255, 0.10);
    --blue: #3987e5;
    --blue-tint: rgba(57, 135, 229, 0.16);
    --amber: #fab219;
    --amber-tint: rgba(250, 178, 25, 0.14);
    --red: #e66767;
    --red-tint: rgba(230, 103, 103, 0.14);
    --bar: #3987e5;
    --bar-alt: #1c5cab;
    --shadow: rgba(0, 0, 0, 0.55);
    --st-good: #0ca30c;
    --st-good-tint: rgba(12, 163, 12, 0.16);
    --st-crit: #d03b3b;
    --st-crit-tint: rgba(230, 103, 103, 0.14);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  background: var(--page);
  color: var(--ink);
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", system-ui, -apple-system, "Segoe UI", sans-serif;
  line-height: 1.65;
  min-width: 1480px;
  display: grid;
  grid-template-columns: var(--side-width, 276px) minmax(0, 1fr) var(--detail-width, 340px);
  transition: grid-template-columns 0.16s ease;
}
code, .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
body.side-collapsed { --side-width: 0px; }
body.detail-collapsed { --detail-width: 0px; }
.pane-toggle {
  appearance: none;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--ink-2);
  width: 32px;
  height: 32px;
  border-radius: 5px;
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 1rem;
  line-height: 1;
  display: block;
  flex-shrink: 0;
  position: fixed;
  top: 12px;
  z-index: 40;
  box-shadow: 0 2px 10px var(--ring);
}
.pane-toggle:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-tint); }

/* ================= サイドバー ================= */
#side {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-right: 1px solid var(--hairline);
  display: flex;
  flex-direction: column;
}
#toggle-side { left: 260px; }
body.side-collapsed #side {
  overflow: visible;
  background: transparent;
  border-right: 0;
}
body.side-collapsed #side { visibility: hidden; }
body.side-collapsed #toggle-side { left: 12px; }
.brand {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 1.32rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 26px 22px 18px;
  border-bottom: 3px solid var(--ink);
  line-height: 1.3;
}
.brand .x { color: var(--blue); }
.brand .sub {
  display: block;
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0.24em;
  margin-top: 4px;
}
#nav { padding: 14px 0; }
.nav-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  padding: 8px 22px 6px;
}
button.nav-item {
  appearance: none;
  border: none;
  background: none;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 22px;
  cursor: pointer;
  color: var(--ink-2);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.9rem;
  text-align: left;
  border-left: 3px solid transparent;
}
button.nav-item:hover { background: var(--page); color: var(--ink); }
button.nav-item.active {
  background: var(--blue-tint);
  border-left-color: var(--blue);
  color: var(--ink);
  font-weight: 700;
}
.nav-item .nav-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.nav-item .dot { width: 8px; height: 8px; border-radius: 50%; }
.nav-item .dot.amber { background: var(--amber); }
.nav-item .dot.red { background: var(--red); }
.nav-item .nav-cnt { font-size: 0.78rem; color: var(--muted); }
.side-legend {
  border-top: 1px solid var(--hairline);
  padding: 16px 22px;
  font-size: 0.8rem;
  color: var(--ink-2);
}
.side-legend .lg-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  color: var(--muted);
  margin-bottom: 8px;
}
.side-legend .key { display: flex; align-items: center; gap: 9px; padding: 3px 0; }
.side-legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--ring); flex-shrink: 0; }
.side-legend .swatch.normal { background: var(--surface); }
.side-legend .swatch.link { background: var(--blue); }
.side-legend .swatch.amber { background: var(--amber); }
.side-legend .swatch.red { background: var(--red); }
.side-meta {
  margin-top: auto;
  border-top: 1px solid var(--hairline);
  padding: 14px 22px 18px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 2;
}
.side-meta code { border: 1px solid var(--hairline); padding: 1px 6px; border-radius: 3px; color: var(--ink-2); }

/* ================= メイン ================= */
#topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--page);
  border-bottom: 1px solid var(--hairline);
  padding: 16px 30px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
#topbar .vt { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
#topbar h2 { font-size: 1.4rem; letter-spacing: 0.02em; white-space: nowrap; }
#topbar .vt .root {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.8rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#topbar .tb-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#topbar input.search {
  width: 340px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  color: var(--ink);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.92rem;
  padding: 9px 14px;
}
#topbar input.search:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
#topbar select.sortsel {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 5px;
  color: var(--ink);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.86rem;
  padding: 9px 10px;
  cursor: pointer;
}
#topbar select.sortsel:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
main { padding: 22px 30px 90px; max-width: 1720px; }

/* ---- KPIタイル ---- */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.tile {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 16px 20px 14px;
}
.tile .value { font-size: 2.5rem; font-weight: 700; line-height: 1.15; }
.tile .value.zero { color: var(--muted); font-weight: 400; }
.tile .label { font-size: 0.82rem; color: var(--ink-2); letter-spacing: 0.04em; margin-top: 2px; }
.tile.accent-blue { border-top: 4px solid var(--blue); }
.tile.accent-amber { border-top: 4px solid var(--amber); }
.tile.accent-red { border-top: 4px solid var(--red); }
.tile[data-jump] { cursor: pointer; transition: box-shadow 0.12s ease, border-color 0.12s ease; }
.tile[data-jump]:hover { border-color: var(--blue); box-shadow: 0 4px 16px var(--ring); }
.tile[data-jump] .label::after { content: " ↓"; color: var(--muted); }
.panel, .tree-sec { scroll-margin-top: 76px; }

/* ---- 前回比diffストリップ ---- */
.diff-strip {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  padding: 11px 16px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 7px;
  font-size: 0.82rem;
}
.diff-strip.none { color: var(--muted); }
.diff-strip .dhead {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  color: var(--ink-2);
  margin-right: 4px;
  white-space: nowrap;
}
.dchip {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.74rem;
  padding: 2px 9px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
}
.dchip.add { color: var(--st-good); border-color: var(--st-good); background: var(--st-good-tint); }
.dchip.del { color: var(--st-crit); border-color: var(--st-crit); background: var(--st-crit-tint); }

/* ---- パネル ---- */
.panel {
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: 6px;
  margin-bottom: 20px;
  overflow: hidden;
}
.panel-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 20px;
  border-bottom: 1px solid var(--hairline);
}
.panel-head .ph-title {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.panel-head .ph-sub { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--muted); }
.panel-body { padding: 18px 20px; }
.panel-row { display: grid; grid-template-columns: 2fr 3fr; gap: 20px; align-items: start; }
.panel-row .panel { margin-bottom: 0; }
.panel-row { margin-bottom: 20px; }

/* ---- 分布バー（積み上げ / 実体＋リンク） ---- */
.dist .lg { display: flex; gap: 18px; justify-content: flex-end; font-size: 0.78rem; color: var(--ink-2); margin-bottom: 10px; }
.dist .lg .key { display: flex; align-items: center; gap: 6px; }
.dist .lg .sw { width: 12px; height: 12px; border-radius: 3px; }
.dist .lg .sw.real { background: var(--bar); }
.dist .lg .sw.alt { background: var(--bar-alt); }
.dist .row { display: grid; grid-template-columns: 200px 1fr 96px; align-items: center; gap: 14px; margin: 9px 0; }
.dist .name {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.84rem;
  color: var(--ink-2);
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dist .track { height: 18px; display: flex; }
.dist .seg { height: 100%; min-width: 2px; }
.dist .seg.real { background: var(--bar); border-radius: 3px 0 0 3px; }
.dist .seg.alt { background: var(--bar-alt); border-radius: 0 4px 4px 0; margin-left: 2px; }
.dist .seg.alt:first-child { border-radius: 4px; margin-left: 0; }
.dist .count { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.84rem; color: var(--ink); white-space: nowrap; }
.dist .count .lnk { color: var(--muted); }

/* ---- スキルカード ---- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
.card {
  background: var(--page);
  border: 1px solid var(--hairline);
  border-left: 4px solid var(--hairline);
  border-radius: 5px;
  padding: 13px 15px 11px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: box-shadow 0.12s ease, transform 0.12s ease;
  cursor: default;
}
.card:hover { box-shadow: 0 4px 16px var(--ring); transform: translateY(-1px); }
.card.sel { box-shadow: 0 0 0 2px var(--blue); }
table.jobs tr.sel td { background: var(--blue-tint); }
.card.role-link { border-left-color: var(--blue); }
.card.role-amber { border-left-color: var(--amber); background: linear-gradient(var(--amber-tint), var(--amber-tint)) var(--page); }
.card.role-red { border-left-color: var(--red); background: linear-gradient(var(--red-tint), var(--red-tint)) var(--page); }
.card .name { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 1.02rem; font-weight: 700; word-break: break-all; }
.card .fm { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--muted); }
.card .badges { display: flex; flex-wrap: wrap; gap: 5px; }
.badge {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}
.badge.b-link { color: var(--blue); border-color: var(--blue); background: var(--blue-tint); }
.badge.b-amber { color: var(--amber); border-color: var(--amber); background: var(--amber-tint); }
.badge.b-red { color: var(--red); border-color: var(--red); background: var(--red-tint); }
.badge.b-mute { color: var(--muted); border-color: var(--hairline); }
.card .desc {
  font-size: 0.86rem;
  color: var(--ink-2);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .desc:empty { display: none; }
.card .path { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.72rem; color: var(--muted); margin-top: auto; word-break: break-all; }
.card .meta-row { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }

/* ---- ツリーセクション ---- */
.tree-head {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink);
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tree-sec:first-child .tree-head { margin-top: 0; }
.tree-head .cnt { color: var(--muted); font-weight: 400; font-size: 0.8rem; }
.notice {
  background: var(--blue-tint);
  border: 1px solid var(--blue);
  border-radius: 5px;
  padding: 10px 15px;
  font-size: 0.85rem;
  color: var(--ink-2);
  margin: 0 0 14px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
}
.empty-note { color: var(--muted); font-size: 0.85rem; padding: 14px; background: var(--page); border: 1px dashed var(--hairline); border-radius: 5px; }

/* ---- 重複マトリクス ---- */
table.matrix { border-collapse: collapse; width: 100%; }
table.matrix th, table.matrix td {
  border: 1px solid var(--hairline);
  padding: 8px 12px;
  font-size: 0.85rem;
  text-align: center;
  white-space: nowrap;
}
table.matrix th {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.76rem;
  color: var(--ink-2);
  background: var(--page);
  font-weight: 700;
}
table.matrix td.name { text-align: left; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; font-size: 0.9rem; }
table.matrix .mark { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; padding: 2px 7px; border-radius: 3px; display: inline-block; margin: 1px; }
table.matrix .mark.real-amber { background: var(--amber-tint); color: var(--amber); border: 1px solid var(--amber); }
table.matrix .mark.real-red { background: var(--red-tint); color: var(--red); border: 1px solid var(--red); }
table.matrix .mark.alias { background: var(--blue-tint); color: var(--blue); border: 1px solid var(--blue); }

/* ---- リンク一覧 ---- */
details.links summary {
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.85rem;
  color: var(--ink-2);
}
details.links ul { list-style: none; padding: 12px 0 0; columns: 2; }
details.links li { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--muted); padding: 2px 0; }
details.links li .from { color: var(--ink-2); }
details.links li .arrow { color: var(--blue); }

/* ---- takt ---- */
.takt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }
.chip {
  display: inline-block;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.76rem;
  padding: 2px 10px;
  border-radius: 11px;
  border: 1px solid var(--ink-2);
  color: var(--ink-2);
  margin: 3px 3px 0 0;
}
.chip.missing { border-style: dashed; color: var(--muted); border-color: var(--muted); }
.chip.wf { border-color: var(--blue); color: var(--blue); border-radius: 3px; }

/* ---- launchd ジョブ表 ---- */
table.jobs { border-collapse: collapse; width: 100%; }
table.jobs th, table.jobs td {
  border-bottom: 1px solid var(--hairline);
  padding: 10px 14px;
  font-size: 0.88rem;
  text-align: left;
  vertical-align: top;
}
table.jobs th {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.74rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 700;
  white-space: nowrap;
}
table.jobs tr[data-pop] { cursor: default; }
table.jobs tr[data-pop]:hover td { background: var(--blue-tint); }
table.jobs td.job-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
table.jobs td.job-desc { max-width: 480px; }
table.jobs td.job-desc .cmd { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--muted); }
table.jobs td.mono-cell { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.8rem; color: var(--ink-2); white-space: nowrap; }
table.jobs td.mono-cell .ago { color: var(--muted); }
.stbadge {
  display: inline-block;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid;
  white-space: nowrap;
}
.stbadge.st-run { color: var(--blue); border-color: var(--blue); background: var(--blue-tint); }
.stbadge.st-ok { color: var(--st-good); border-color: var(--st-good); background: var(--st-good-tint); }
.stbadge.st-err { color: var(--st-crit); border-color: var(--st-crit); background: var(--st-crit-tint); }
.stbadge.st-off { color: var(--muted); border-color: var(--hairline); background: var(--page); }
button.runbtn {
  appearance: none;
  cursor: pointer;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--blue);
  color: var(--blue);
  background: var(--blue-tint);
  white-space: nowrap;
}
button.runbtn:hover { background: var(--blue); color: var(--surface); }
button.runbtn.confirm { border-color: var(--amber); color: var(--amber); background: var(--amber-tint); }
button.runbtn.confirm:hover { background: var(--amber); color: var(--surface); }
button.runbtn:disabled { border-color: var(--hairline); color: var(--muted); background: var(--page); cursor: not-allowed; }
#detail pre.pop-err {
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 0.76rem;
  color: var(--st-crit);
  background: var(--st-crit-tint);
  border: 1px solid var(--st-crit);
  border-radius: 5px;
  padding: 10px 12px;
  margin-top: 4px;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ---- 右固定詳細ペイン ---- */
#detail {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: var(--surface);
  border-left: 1px solid var(--hairline);
  padding: 0;
}
#toggle-detail { right: 324px; }
body.detail-collapsed #detail {
  overflow: visible;
  background: transparent;
  border-left: 0;
}
body.detail-collapsed #detail { visibility: hidden; }
body.detail-collapsed #toggle-detail { right: 12px; }
#detail .detail-head {

const LAYOUT_KEY = 'agent-assets-layout-v1';

// ---- 左右ペイン開閉 ----
function loadLayoutState() {
  try {
    return JSON.parse(localStorage.getItem(LAYOUT_KEY) || '{}') || {};
  } catch (e) {
    return {};
  }
}
function saveLayoutState(state) {
  try {
    localStorage.setItem(LAYOUT_KEY, JSON.stringify(state));
  } catch (e) {
    // file:// やプライベートモードで保存できない場合も表示は続行
  }
}
function applyPaneState(state) {
  document.body.classList.toggle('side-collapsed', !!state.sideCollapsed);
  document.body.classList.toggle('detail-collapsed', !!state.detailCollapsed);
  const sideBtn = document.getElementById('toggle-side');
  const detailBtn = document.getElementById('toggle-detail');
  sideBtn.textContent = state.sideCollapsed ? '›' : '‹';
  sideBtn.setAttribute('aria-label', state.sideCollapsed ? '左パネルを開く' : '左パネルを閉じる');
  detailBtn.textContent = state.detailCollapsed ? '‹' : '›';
  detailBtn.setAttribute('aria-label', state.detailCollapsed ? '右パネルを開く' : '右パネルを閉じる');
}
const layoutState = loadLayoutState();
applyPaneState(layoutState);
document.getElementById('toggle-side').addEventListener('click', function () {
  layoutState.sideCollapsed = !layoutState.sideCollapsed;
  applyPaneState(layoutState);
  saveLayoutState(layoutState);
});
document.getElementById('toggle-detail').addEventListener('click', function () {
  layoutState.detailCollapsed = !layoutState.detailCollapsed;
  applyPaneState(layoutState);
  saveLayoutState(layoutState);
});

// ---- ヘルパー ----
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function uniqueReals(entries) {
  const set = new Set();
  entries.forEach(function (e) { if (!e.broken) set.add(e.real); });
  return set.size;
}
function allSkills(scopes) {
  return scopes.reduce(function (acc, s) { return acc.concat(s.skills); }, []);
}

// ---- ポップオーバー登録 ----
var POP = [];
function reg(role, html) { POP.push({ role: role, html: html }); return POP.length - 1; }

// ライブモード（--serve 起動時のみ true になり、launchd の手動実行ボタンが有効化される）
var serverMode = false;
// スキルカードの並び順（name / oldest / newest）
var sortMode = 'name';

function skillRole(e) {
  if (e.dupCross.length > 0) return 'red';
  if (e.dupSame) return 'amber';
  if (e.link) return 'link';
  return '';
}
// ---- クリックで開く ----
function absPath(p) { return p && p.charAt(0) === '~' && DATA.home ? DATA.home + p.slice(1) : p; }
/** data-open 属性（共有用HTMLでは実パスを埋め込まないため無効化） */
function openAttr(p) {
  if (DATA.redacted || !p) return '';
  return ' data-open="' + esc(absPath(p)) + '" title="クリックでファイル/フォルダを開く"';
}
function daysSince(ms) { return Math.floor((Date.now() - ms) / 86400000); }
function isStale(e) { return !e.broken && e.mtimeMs != null && daysSince(e.mtimeMs) >= DATA.staleDays; }
function fmtDate(ms) {
  const d = new Date(ms);
  const pad2 = function (n) { return n < 10 ? '0' + n : String(n); };
  const days = daysSince(ms);
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) +
    '（' + (days <= 0 ? '今日' : days + '日前') + '）';
}
function skillBadges(e) {
  var b = '';
  if (e.link) b += '<span class="badge b-link">↪ リンク → ' + esc(e.link) + '</span>';
  if (e.dupSame) b += '<span class="badge b-amber">⚠ スコープ内重複（.claude＋.agents）</span>';
  e.dupCross.forEach(function (l) { b += '<span class="badge b-red">✖ 重複 → ' + esc(l) + '</span>'; });
  if (e.broken) b += '<span class="badge b-mute">リンク切れ</span>';
  if (!e.desc && !e.broken) b += '<span class="badge b-mute">SKILL.md メタ情報なし</span>';
  if (isStale(e)) b += '<span class="badge b-mute">⏳ ' + daysSince(e.mtimeMs) + '日未更新</span>';
  if (e.tools !== null) b += '<span class="badge b-mute">tools: ' + e.tools + '</span>';
  return b;
}

// ---- 統計 ----
function computeStats(scopes) {
  const skills = allSkills(scopes);
  const dupSameNames = new Set();
  const dupCrossNames = new Set();
  skills.forEach(function (e) {
    if (e.dupSame) dupSameNames.add(e.dir);
    if (e.dupCross.length > 0) dupCrossNames.add(e.dir);
  });
  let wf = 0, ps = 0;
  scopes.forEach(function (s) {
    if (s.takt) { wf += s.takt.workflows.length; ps += s.takt.personas.length; }
  });
  const staleReals = new Set();
  skills.forEach(function (e) { if (isStale(e)) staleReals.add(e.real); });
  return {
    real: uniqueReals(skills),
    links: skills.filter(function (e) { return e.link !== null; }).length,
    dupSame: dupSameNames.size,
    dupCross: dupCrossNames.size,
    stale: staleReals.size,
    workflows: wf,
    personas: ps,
  };
}

function renderTiles(stats, withLaunchd) {
  function tile(value, label, accent, alwaysInk, jump, sort) {
    const zero = value === 0 && !alwaysInk;
    return '<div class="tile ' + (accent || '') + '"' +
      (jump ? ' data-jump="' + jump + '"' + (sort ? ' data-sort="' + sort + '"' : '') + ' title="クリックで一覧へ"' : '') + '>' +
      '<div class="value' + (zero ? ' zero' : '') + '">' + value + '</div>' +
      '<div class="label">' + esc(label) + '</div></div>';
  }
  let html = '<div class="tiles">' +
    tile(stats.real, 'スキル実体（重複除外）', '', true, '.scope-panel') +
    tile(stats.links, 'リンク（エイリアス）', 'accent-blue', true, '#sec-links') +
    tile(stats.dupSame, 'スコープ内重複', stats.dupSame > 0 ? 'accent-amber' : '', false, '#sec-matrix') +
    tile(stats.dupCross, 'スコープ間重複', stats.dupCross > 0 ? 'accent-red' : '', false, '#sec-matrix') +
    tile(stats.stale, DATA.staleDays + '日以上未更新', stats.stale > 0 ? 'accent-amber' : '', false, '.scope-panel', 'oldest') +
    tile(stats.workflows, 'takt ワークフロー', '', true, '.sec-takt-wf') +
    tile(stats.personas, 'takt ペルソナ', '', true, '.sec-takt-ps');
  if (withLaunchd && DATA.launchd && DATA.launchd.length > 0) {
    const errs = DATA.launchd.filter(function (j) { return j.status === 'error'; }).length;
    html += tile(DATA.launchd.length, errs > 0 ? 'launchd（エラー ' + errs + ' 件）' : 'launchd ジョブ', errs > 0 ? 'accent-red' : '', true, '#sec-launchd');
  }
  if (withLaunchd && DATA.plugins && DATA.plugins.length > 0) {
    html += tile(DATA.plugins.length, 'プラグイン（Claude/Codex）', '', true, '#sec-plugins');
  }
  return html + '</div>';
}

// ---- 前回比diffストリップ（全体ビューのみ） ----
function renderDiffStrip() {
  const d = DATA.diff;
  if (!d) return '';
  if (d.added.length === 0 && d.removed.length === 0) {
    return '<div class="diff-strip none">前回生成（' + esc(d.prevAt) + '）から増減なし</div>';
  }
  let chips = '';
  d.added.forEach(function (k) { chips += '<span class="dchip add">＋ ' + esc(k) + '</span>'; });
  d.removed.forEach(function (k) { chips += '<span class="dchip del">− ' + esc(k) + '</span>'; });
  return '<div class="diff-strip"><span class="dhead">前回生成（' + esc(d.prevAt) + '）比: ＋' +
    d.added.length + ' / −' + d.removed.length + '</span>' + chips + '</div>';
}

function panel(title, sub, bodyHtml, extraClass, id) {
  return '<section class="panel ' + (extraClass || '') + '"' + (id ? ' id="' + id + '"' : '') + '>' +
    '<div class="panel-head"><span class="ph-title">' + esc(title) + '</span>' +
    (sub ? '<span class="ph-sub">' + esc(sub) + '</span>' : '') +
    '</div><div class="panel-body">' + bodyHtml + '</div></section>';
}

// ---- 分布パネル（積み上げ: 実体エントリ＋リンク） ----
function renderDistPanel(scopes) {
  const rows = scopes.map(function (s) {
    const real = s.skills.filter(function (e) { return !e.link; }).length;
    const links = s.skills.filter(function (e) { return e.link; }).length;
    return { label: s.label, real: real, links: links };
  });
  const max = Math.max.apply(null, rows.map(function (r) { return r.real + r.links; }).concat([1]));
  let html = '<div class="dist">' +
    '<div class="lg"><span class="key"><span class="sw real"></span>実体エントリ</span>' +
    '<span class="key"><span class="sw alt"></span>リンク</span></div>';
  rows.forEach(function (r) {
    const wr = Math.round((r.real / max) * 100);
    const wl = Math.round((r.links / max) * 100);
    html += '<div class="row"><div class="name">' + esc(r.label) + '</div><div class="track">' +
      (r.real > 0 ? '<div class="seg real" style="width:' + wr + '%"></div>' : '') +
      (r.links > 0 ? '<div class="seg alt" style="width:' + wl + '%"></div>' : '') +
      '</div><div class="count">' + r.real + (r.links > 0 ? ' <span class="lnk">+ ' + r.links + '</span>' : '') + '</div></div>';
  });
  return panel('スコープ別エントリ構成', '実体 + リンク', html + '</div>');
}

// ---- 重複マトリクスパネル ----
function renderMatrixPanel(scopes) {
  const byName = {};
  allSkills(scopes).forEach(function (e) {
    if (!e.dupSame && e.dupCross.length === 0) return;
    (byName[e.dir] = byName[e.dir] || []).push(e);
  });
  const names = Object.keys(byName).sort();
  if (names.length === 0) {
    return panel('重複マトリクス', '', '<div class="empty-note">✓ 重複なし — 同名の別実体は存在しません（リンクによる同一実体の共有は重複に数えません）</div>', '', 'sec-matrix');
  }
  let html = '<div style="overflow-x:auto"><table class="matrix"><thead><tr><th style="text-align:left">スキル名</th>';
  scopes.forEach(function (s) { html += '<th>' + esc(s.label) + '</th>'; });
  html += '</tr></thead><tbody>';
  names.forEach(function (name) {
    html += '<tr><td class="name">' + esc(name) + '</td>';
    scopes.forEach(function (s) {
      const here = byName[name].filter(function (e) { return s.skills.indexOf(e) !== -1; });
      html += '<td>';
      here.forEach(function (e) {
        const treeLabel = e.tree === 'claude' ? '.claude' : '.agents';
        if (e.link) {
          html += '<span class="mark alias">↪ ' + treeLabel + '</span>';
        } else {
          const cls = e.dupCross.length > 0 ? 'real-red' : 'real-amber';
          html += '<span class="mark ' + cls + '">● ' + treeLabel + '</span>';
        }
      });
      if (here.length === 0) html += '<span style="color:var(--muted)">—</span>';
      html += '</td>';
    });
    html += '</tr>';
  });
  return panel('重複マトリクス', '同名の別実体がどこにあるか', html + '</tbody></table></div>', '', 'sec-matrix');
}

// ---- リンク一覧パネル ----
function renderLinksPanel(scopes) {
  const links = [];
  scopes.forEach(function (s) {
    s.skills.forEach(function (e) { if (e.link) links.push(e); });
    if (s.claudeTreeLink) {
      links.unshift({ path: (s.claudeDir || s.label + '/.claude/skills'), link: s.claudeTreeLink, dir: '(ディレクトリ丸ごと)' });
    }
  });
  if (links.length === 0) return '';
  let html = '<details class="links"><summary>↪ ' + links.length + ' 本のシンボリックリンク — クリックで展開</summary><ul>';
  links.forEach(function (e) {
    html += '<li><span class="from">' + esc(e.path) + '</span> <span class="arrow">→</span> ' + esc(e.link) + '</li>';
  });
  return panel('リンク（エイリアス）一覧', '', html + '</ul></details>', '', 'sec-links');
}

// ---- launchd ジョブパネル ----
function fmtWhen(ms) {
  if (ms == null) return '—';
  const d = new Date(ms);
  const pad2 = function (n) { return n < 10 ? '0' + n : String(n); };
  const abs = (d.getMonth() + 1) + '/' + d.getDate() + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  const diff = Date.now() - ms;
  let ago;
  if (diff < 60000) ago = 'たった今';
  else if (diff < 3600000) ago = Math.floor(diff / 60000) + '分前';
  else if (diff < 86400000) ago = Math.floor(diff / 3600000) + '時間前';
  else ago = Math.floor(diff / 86400000) + '日前';
  return abs + '<span class="ago">（' + ago + '）</span>';
}
function jobBadge(j) {
  if (j.status === 'running') return '<span class="stbadge st-run">● 実行中 (PID ' + j.pid + ')</span>';
  if (j.status === 'error') return '<span class="stbadge st-err">✖ エラー (exit ' + j.lastExit + ')</span>';
  if (j.status === 'unloaded') return '<span class="stbadge st-off">⏸ 未ロード</span>';
  return '<span class="stbadge st-ok">✓ 正常待機</span>';
}
function runBtn(j) {
  if (serverMode) {
    if (!j.loaded) return '<button class="runbtn" disabled title="未ロードのジョブは実行できません">▶ 実行</button>';
    const restart = j.status === 'running';
    return '<button class="runbtn" data-label="' + esc(j.label) + '" data-restart="' + (restart ? '1' : '0') + '">' +
      (restart ? '↻ 再起動' : '▶ 実行') + '</button>';
  }
  const cmd = 'launchctl kickstart ' + (j.status === 'running' ? '-k ' : '') + 'gui/' + DATA.uid + '/' + j.label;
  return '<button class="runbtn" data-cmd="' + esc(cmd) + '" title="静的モード: クリックで実行コマンドをコピー（ライブ実行は npm run agent-assets:serve）">⧉ コピー</button>';

// ---- スコープパネル ----
function sortEntries(entries) {
  if (sortMode === 'name') return entries; // スキャン時点で名前順
  const arr = entries.slice();
  if (sortMode === 'oldest') {
    arr.sort(function (a, b) { return (a.mtimeMs == null ? Infinity : a.mtimeMs) - (b.mtimeMs == null ? Infinity : b.mtimeMs); });
  } else {
    arr.sort(function (a, b) { return (b.mtimeMs || 0) - (a.mtimeMs || 0); });
  }
  return arr;
}
function renderScopePanel(s) {
  let body = '';
  if (s.claudeTreeLink) {
    body += '<div class="notice">↪ .claude/skills はディレクトリ丸ごとリンク → ' + esc(s.claudeTreeLink) + '（実体は .agents/skills 側に一覧・二重カウントなし）</div>';
  }
  ['claude', 'agents'].forEach(function (tree) {
    const dir = tree === 'claude' ? s.claudeDir : s.agentsDir;
    if (!dir || (tree === 'claude' && s.claudeTreeLink)) return;
    const entries = sortEntries(s.skills.filter(function (e) { return e.tree === tree; }));
    body += '<div class="tree-sec"><div class="tree-head"' + openAttr(dir) + '>' + esc(dir) + ' <span class="cnt">' + entries.length + ' 件</span></div>';
    body += entries.length > 0
      ? '<div class="grid">' + entries.map(function (e) { return renderSkillCard(e, s.label); }).join('') + '</div>'
      : '<div class="empty-note">スキルなし</div>';
    body += '</div>';
  });

  if (s.takt) {
    const personaFiles = s.takt.personas.map(function (p) { return p.file.replace(/\.md$/, ''); });
    body += '<div class="tree-sec sec-takt-wf"><div class="tree-head"' + openAttr(s.takt.root + '/workflows') + '>' + esc(s.takt.root) + '/workflows <span class="cnt">' + s.takt.workflows.length + ' 件</span></div>';
    body += s.takt.workflows.length > 0
      ? '<div class="takt-grid">' + s.takt.workflows.map(function (w) { return renderWorkflowCard(w, personaFiles, s.label, s.takt.root); }).join('') + '</div>'
      : '<div class="empty-note">ワークフローなし</div>';
    body += '</div>';
    if (s.takt.hasPersonasDir) {
      body += '<div class="tree-sec sec-takt-ps"><div class="tree-head"' + openAttr(s.takt.root + '/personas') + '>' + esc(s.takt.root) + '/personas <span class="cnt">' + s.takt.personas.length + ' 件</span></div>';
      body += s.takt.personas.length > 0
        ? '<div class="takt-grid">' + s.takt.personas.map(function (p) { return renderPersonaCard(p, s.label, s.takt.root); }).join('') + '</div>'
        : '<div class="empty-note">ペルソナなし</div>';
      body += '</div>';

      body += '<div class="tree-sec"><div class="tree-head">' + esc(s.takt.root) + '/personas <span class="cnt">なし</span></div>' +
        '<div class="empty-note">personas ディレクトリなし（このスコープの takt は facets レイアウト）</div></div>';
    }
  }
  return panel('スコープ: ' + s.label, s.root, body, 'scope-panel');
}

  if (activeView === 'launchd') {

  } else if (activeView === 'plugins') {
    document.getElementById('view-title').textContent = 'プラグイン';

    html = renderPluginsPanel() || '<div class="empty-note">プラグインなし</div>';

      ? DATA.scopes
      : DATA.scopes.filter(function (s) { return s.id === activeView; });

    document.getElementById('view-title').textContent =
      activeView === 'all' ? '全体サマリー' : scopes[0].label;
    document.getElementById('view-root').textContent =
      activeView === 'all' ? DATA.scopes.length + ' スコープ' : scopes[0].root;

// ---- 検索 ----
function applySearch() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('[data-search]').forEach(function (el) {
    el.classList.toggle('hidden', q !== '' && el.getAttribute('data-search').indexOf(q) === -1);
  });
  // 検索中はヒットゼロのセクション・スコープ/プラグインパネルを見出しごと隠す
  document.querySelectorAll('.tree-sec, .scope-panel, .plugins-panel').forEach(function (sec) {
    const hasVisible = Array.prototype.some.call(
      sec.querySelectorAll('[data-search]'),
      function (el) { return !el.classList.contains('hidden'); }

    sec.classList.toggle('hidden', q !== '' && !hasVisible);
  });
}

    detailBody.classList.add('pop-' + entry.role);
  }
  detailBody.innerHTML = entry.html;

// ホバーで即ペイン更新（ペインは被らないので遅延は最小限）。マウスを離しても内容は残る
var hoverTimer = null;
document.addEventListener('mouseover', function (ev) {
  const t = ev.target;
  const card = t && t.closest ? t.closest('[data-pop]') : null;
  if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
  if (!card) return;
  const idx = parseInt(card.getAttribute('data-pop'), 10);
  if (idx === curPop) return;
  hoverTimer = setTimeout(function () { showPop(idx, card); }, 150);
});

  const tile = ev.target && ev.target.closest ? ev.target.closest('.tile[data-jump]') : null;
  if (!tile) return;
  // 未更新タイルは並び順を「古い順」に切り替えてから飛ぶ（再描画で DOM が入れ替わるため target 取得はその後）
  const sortHint = tile.getAttribute('data-sort');
  if (sortHint && sortMode !== sortHint) {
    sortMode = sortHint;
    document.getElementById('sort').value = sortHint;
    renderView(true);
  }
  const target = document.querySelector(tile.getAttribute('data-jump'));
  if (!target) return;
  // リンク一覧タイルは折りたたみも開く
  const details = target.querySelector('details.links');
  if (details) details.open = true;
  // scrollIntoView は overflow:hidden の .panel 内部をスクロールしてしまうため、ウィンドウ座標で直接スクロールする
  // （このレイアウトでは smooth 指定が効かないため Markdown アンカー同様の即時ジャンプ）
  window.scrollTo(0, target.getBoundingClientRect().top + window.scrollY - 76);
});

// ---- クリックでファイル/フォルダを開く ----
document.addEventListener('click', function (ev) {
  const t = ev.target;
  if (!t || !t.closest) return;
  // ボタン・タイル・折りたたみ見出しのクリックは既存動作を優先
  if (t.closest('button') || t.closest('a') || t.closest('summary') || t.closest('.tile')) return;
  const el = t.closest('[data-open]');
  if (!el) return;
  const p = el.getAttribute('data-open');
  if (!p) return;
  if (serverMode) {
    // ライブモード: サーバ経由で Finder / 既定アプリで開く
    fetch('/api/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: p }),
    })
      .then(function (r) { return r.json(); })
      .then(function (res) { if (!res.ok && res.error) console.error('open error:', res.error); })
      .catch(function (e) { console.error('open error:', e); });
  } else {
    // 静的モード（file:// で閲覧中）: file:// URL を新規タブで開く
    // フォルダはブラウザのディレクトリ一覧、ファイルは中身がそのまま表示される
    window.open('file://' + p.split('/').map(encodeURIComponent).join('/'), '_blank');
  }
});

// ---- launchd 手動実行 ----
var pollTimer = null;
function pollStatus(remain) {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(function () {
    fetch('/api/launchd/status', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (jobs) {
        DATA.launchd = jobs;
        if (activeView === 'launchd' || activeView === 'all') renderView(true);
        if (remain > 1) pollStatus(remain - 1);
      })
      .catch(function () {});
  }, 2500);
}
document.addEventListener('click', function (ev) {
  const btn = ev.target && ev.target.closest ? ev.target.closest('.runbtn') : null;
  if (!btn || btn.disabled) return;

  // 静的モード: kickstart コマンドをクリップボードへ
  const cmd = btn.getAttribute('data-cmd');
  if (cmd) {
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) { /* noop */ }
    document.body.removeChild(ta);
    btn.textContent = '✓ コピー済み';
    setTimeout(function () { btn.textContent = '⧉ コピー'; }, 2000);
    return;
  }

  // ライブモード: 2段階確認 → POST /api/launchd/run
  const label = btn.getAttribute('data-label');
  if (!label) return;
  const restart = btn.getAttribute('data-restart') === '1';
  if (btn.getAttribute('data-confirm') !== '1') {
    btn.setAttribute('data-confirm', '1');
    btn.classList.add('confirm');
    btn.textContent = restart ? '再起動する？' : '実行する？';
    setTimeout(function () {
      btn.removeAttribute('data-confirm');
      btn.classList.remove('confirm');
      btn.textContent = restart ? '↻ 再起動' : '▶ 実行';
    }, 3000);
    return;
  }
  btn.disabled = true;
  btn.classList.remove('confirm');
  btn.textContent = '… 起動中';
  fetch('/api/launchd/run', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label: label, restart: restart }),
  })
    .then(function (r) { return r.json(); })
    .then(function (res) {
      btn.textContent = res.ok ? '✓ 起動指示済み' : '✖ 失敗';
      if (!res.ok && res.error) console.error('launchd run error:', res.error);
      pollStatus(4);
    })
    .catch(function () { btn.textContent = '✖ 失敗'; });
});

// ---- 初期化 ----
document.getElementById('meta-generated').textContent = '生成: ' + DATA.generatedAt;
document.getElementById('meta-command').textContent = DATA.command;
if (DATA.redacted) document.getElementById('meta-mode').textContent = 'モード: 共有用（launchd・プラグイン・実パス除外）';
document.getElementById('search').addEventListener('input', applySearch);
document.getElementById('sort').addEventListener('change', function () {
  sortMode = this.value;
  renderView(true);
});
renderNav();
renderView();
// ライブモード検出（--serve で配信されている場合のみ API が生えている）
fetch('/api/launchd/status', { cache: 'no-store' })
  .then(function (r) { return r.ok ? r.json() : null; })
  .then(function (jobs) {
    if (!jobs) return;
    serverMode = true;
    DATA.launchd = jobs;
    document.getElementById('meta-mode').textContent = 'モード: ライブ（手動実行可）';
    renderView(true);
  })
  .catch(function () { /* file:// や静的配信では静的モードのまま */ });
</script>
</body>
